    <line x1="117" y1="95" x2="117" y2="325" stroke="#b9c3cf" stroke-dasharray="6 6"/>
    <line x1="45" y1="275" x2="190" y2="275" stroke="#a3afbd" stroke-width="2"/>
    <circle cx="117" cy="170" r="22" fill="#18212b"/>
