    <line x1="103" y1="267" x2="95" y2="308" stroke="#1f2b36" stroke-width="8" stroke-linecap="round"/>
    <line x1="132" y1="267" x2="140" y2="308" stroke="#1f2b36" stroke-width="8" stroke-linecap="round"/>
    <line x1="92" y1="313" x2="112" y2="313" stroke="#cc6e4b" stroke-width="3"/>
    <line x1="137" y1="313" x2="157" y2="313" stroke="#cc6e4b" stroke-width="3"/>
    <text x="28" y="354" class="body">• 발 위치·간격 고정</text>
    <text x="28" y="382" class="body">• 편한 자연 기립 자세</text>
