    <rect class="bar" x="0" y="370" width="235" height="50" rx="0"/><text x="118" y="402" text-anchor="middle" fill="white" font-family="Arial,'Noto Sans KR'" font-size="16" font-weight="700">변화를 한눈에 파악</text>
