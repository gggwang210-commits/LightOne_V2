    <circle cx="405" cy="160" r="62" fill="none" stroke="#c9d5e7" stroke-width="16"/><path d="M405 98 A62 62 0 1 1 350 190" fill="none" stroke="#2f9b66" stroke-width="16" stroke-linecap="round"/>
    <text x="405" y="167" text-anchor="middle" font-family="Arial" font-size="50" font-weight="800" fill="#082452">82</text><text x="405" y="198" text-anchor="middle" class="small">종합 점수</text>
