<svg width="1600" height="1000" viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef4fb"/>
    </linearGradient>
    <linearGradient id="navy" x1="0" x2="1">
      <stop offset="0" stop-color="#082452"/>
      <stop offset="1" stop-color="#0b3a7a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0b1f3a" flood-opacity="0.15"/>
    </filter>
    <style>
      .title{font-family:Arial,'Noto Sans KR',sans-serif;font-size:42px;font-weight:800;fill:#082452}
      .subtitle{font-family:Arial,'Noto Sans KR',sans-serif;font-size:20px;fill:#1c2e45}
      .step-title{font-family:Arial,'Noto Sans KR',sans-serif;font-size:20px;font-weight:800;fill:#082452}
      .body{font-family:Arial,'Noto Sans KR',sans-serif;font-size:15px;fill:#1d2b3a}
      .small{font-family:Arial,'Noto Sans KR',sans-serif;font-size:13px;fill:#40536a}
      .num{font-family:Arial,'Noto Sans KR',sans-serif;font-size:22px;font-weight:800;fill:white}
      .badge{fill:url(#navy)}
      .card{fill:white;stroke:#b9c9de;stroke-width:1.2;rx:14;filter:url(#shadow)}
      .bar{fill:#082452}
      .line{stroke:#4d73a4;stroke-width:4;fill:none;marker-end:url(#arrow)}
      .thin{stroke:#8aa6c8;stroke-width:1.4;fill:none}
      .muted{fill:#f4f7fb;stroke:#d5e0ef;stroke-width:1}
      .accent{fill:#4f7cc4}
      .green{fill:#2f9b66}.orange{fill:#f0a23b}.red{fill:#e25c4a}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#4d73a4"/>
    </marker>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <text x="800" y="58" text-anchor="middle" class="title">LIGHT ONE 촬영·분석·점수화 흐름도</text>
  <text x="800" y="94" text-anchor="middle" class="subtitle">동일 조건 촬영 → 품질검사(QC) → 랜드마크 추출 → 변화량 계산 → 점수화 → PT 피드백</text>

  <!-- step cards -->
  <g transform="translate(35,130)">
    <rect class="card" width="235" height="420"/>
    <circle class="badge" cx="34" cy="36" r="20"/><text x="34" y="44" text-anchor="middle" class="num">1</text>
    <text x="65" y="43" class="step-title">촬영 조건 단순화</text>
    <g transform="translate(28,92)">
      <rect class="muted" width="180" height="58" rx="8"/><text x="68" y="34" class="body">주 1회 동일 시간대</text>
      <rect class="muted" y="78" width="180" height="58" rx="8"/><text x="68" y="112" class="body">같은 공간·조명</text>
      <rect class="muted" y="156" width="180" height="58" rx="8"/><text x="68" y="190" class="body">카메라 고정</text>
      <rect class="muted" y="234" width="180" height="58" rx="8"/><text x="68" y="268" class="body">변수 최소화</text>
      <text x="0" y="335" class="small">목표: 반복 측정 오차 감소</text>
    </g>
    <rect class="bar" x="0" y="370" width="235" height="50" rx="0"/><text x="118" y="402" text-anchor="middle" fill="white" font-family="Arial,'Noto Sans KR'" font-size="16" font-weight="700">정확도보다 일관성 우선</text>
  </g>
  <path class="line" d="M285 340 L310 340"/>

  <g transform="translate(320,130)">
