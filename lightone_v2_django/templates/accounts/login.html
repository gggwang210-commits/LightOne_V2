{% extends 'base.html' %}

{% block title %}로그인 - LIGHT ONE{% endblock %}

{% block content %}
<section class="section-block" style="max-width: 400px; margin: 100px auto;">
  <div class="panel-card">
    <h2 style="text-align: center; margin-bottom: 20px;">LIGHT ONE 로그인</h2>
    <form method="post">
      {% csrf_token %}
      <div style="margin-bottom: 15px;">
        <label for="id_username" style="display: block; margin-bottom: 5px;">아이디</label>
        <input type="text" name="username" id="id_username" class="form-control" style="width: 100%; padding: 10px; border: 1px solid var(--line); border-radius: 8px;">
      </div>
      <div style="margin-bottom: 20px;">
        <label for="id_password" style="display: block; margin-bottom: 5px;">비밀번호</label>
        <input type="password" name="password" id="id_password" class="form-control" style="width: 100%; padding: 10px; border: 1px solid var(--line); border-radius: 8px;">
      </div>
      <button type="submit" style="width: 100%; padding: 12px; background: var(--blue); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">로그인</button>
    </form>
  </div>
</section>
{% endblock %}
