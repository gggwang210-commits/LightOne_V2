    <circle class="badge" cx="34" cy="36" r="20"/><text x="34" y="44" text-anchor="middle" class="num">3</text>
    <text x="65" y="43" class="step-title">정면·측면 4컷 촬영</text>
    <text x="44" y="94" class="body" font-weight="700">정면</text>
    <rect class="muted" x="35" y="112" width="75" height="90" rx="8"/><text x="72" y="164" text-anchor="middle" class="small">상체</text>
    <rect class="muted" x="125" y="112" width="75" height="90" rx="8"/><text x="162" y="164" text-anchor="middle" class="small">하체</text>
    <text x="44" y="236" class="body" font-weight="700">측면</text>
    <rect class="muted" x="35" y="254" width="75" height="90" rx="8"/><text x="72" y="306" text-anchor="middle" class="small">상체</text>
    <rect class="muted" x="125" y="254" width="75" height="90" rx="8"/><text x="162" y="306" text-anchor="middle" class="small">하체</text>
    <text x="26" y="365" class="body">• 전신 균형을 다각도로 기록</text>
    <rect class="bar" x="0" y="370" width="235" height="50" rx="0"/><text x="118" y="402" text-anchor="middle" fill="white" font-family="Arial,'Noto Sans KR'" font-size="16" font-weight="700">기록 단위 표준화</text>
  </g>
  <path class="line" d="M855 340 L880 340"/>

  <g transform="translate(890,130)">
