# This workflow installs Django MVP dependencies, runs a minimal flake8 gate, and executes Django tests.
# Keep the working path aligned with the actual app root: lightone_v2_django.

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f lightone_v2_django/requirements.txt ]; then pip install -r lightone_v2_django/requirements.txt; fi

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names.
        flake8 lightone_v2_django --count --select=E9,F63,F7,F82 --show-source --statistics
        # Treat style findings as warnings for MVP velocity.
        flake8 lightone_v2_django --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test with Django
      run: |
        cd lightone_v2_django
        python manage.py check
        python manage.py test
