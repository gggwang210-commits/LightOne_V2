    <text x="50" y="75" class="small">항목</text><text x="160" y="75" class="small">변화량</text><text x="250" y="75" class="small">점수</text>
    <text x="50" y="115" class="body">어깨</text><text x="160" y="115" class="body">+0.1°</text><text x="250" y="115" class="body">92</text>
